vision:
  fps: 5              # 5 FPS is enough for posture alerts; halves MJPEG decode load
  resolution: [320, 240]
  model_path: "models/movenet_lightning.tflite"  # MoveNet via ai-edge-litert (RPi5)

thresholds:
  neck_flexion_warn: 25.0       # degrees; 0 = upright, positive = forward flex
  neck_flexion_severe: 40.0
  fhp_warn: 0.15                # normalized to shoulder width
  fhp_severe: 0.30
  shoulder_asymmetry_warn: 5.0  # degrees of vertical tilt
  shoulder_asymmetry_severe: 10.0

hardware:
  # ── Buzzer pasivo (PWM 2 kHz) — activa solo en LEVEL3 ───────────────────
  buzzer_pin: 18
  buzzer_active: false   # false = pasivo (PWM); true = activo (DC)
  buzzer_invert: false   # true = lógica invertida (LOW=ON, HIGH=OFF)

  # ── Motor de vibración (DC) — activa en LEVEL2 ───────────────────────────
  motor_pin: 17
  motor_active: true     # true = DC HIGH/LOW; false = PWM
  motor_invert: false

  # ── OLED ─────────────────────────────────────────────────────────────────
  oled_address: "0x3C"  # quoted string — parsed with int(str(v), 16)
  oled_width: 128
  oled_height: 64

alert_state:
  bad_frame_threshold: 10       # N consecutive bad frames before alert fires
  good_frame_reset: 5           # M consecutive good frames to clear alert

logging:
  level: "INFO"
  csv_output: false      # set true to enable; sync writes on SD card add latency
  csv_path: "ergotrack_log.csv"
